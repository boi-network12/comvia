# fly.toml
app = "comvia-realtime"
primary_region = "ams"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[http_service.checks]]
  grace_period = "10s"
  interval = "15s"
  method = "GET"
  timeout = "2s"
  path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256

[env]
  NODE_ENV = "production"
  PORT = "8080"
  ALLOWED_ORIGINS = "https://comvia-widget.vercel.app,https://comvia-backend-endpoint.vercel.app,https://comvia.vercel.app"
  API_URL = "https://comvia-backend-endpoint.vercel.app/api"