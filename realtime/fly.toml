# fly.toml
app = 'comvia-realtime'
primary_region = 'ams'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']
  # ✅ Add health check
  [http_service.checks]
    [http_service.checks.health]
      path = "/health"
      interval = "5s"
      timeout = "2s"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256

# ✅ Add environment variables
[env]
  NODE_ENV = 'production'
  PORT = '8080'
  ALLOWED_ORIGINS = 'https://comvia-widget.vercel.app,https://comvia-backend-endpoint.vercel.app,https://your-app.vercel.app',https://comvia.vercel.app
  API_URL = 'https://comvia-backend-endpoint.vercel.app/api'